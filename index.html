<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Box — Anamorphic Wall-Wash Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-teal-500 flex items-center justify-center shadow-md">
                <svg class="w-6 h-6 text-[#0b0f19]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white">Shadow Box</h1>
                <p class="text-xs font-semibold text-teal-400 uppercase tracking-wider">Anamorphic Wall-Wash Generator</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="exportDXF()" class="px-5 py-2.5 rounded-lg bg-teal-500 hover:bg-teal-400 text-gray-950 font-bold transition-all flex items-center gap-2 text-sm shadow-lg">
                Export DXF
            </button>
            <button onclick="exportSVG()" class="px-5 py-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 text-white font-bold transition-all border border-gray-700 flex items-center gap-2 text-sm">
                Export SVG
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
        <!-- Left Side: Interactive 3D Preview & 2D Layout Canvas -->
        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="flex bg-[#111827] p-1 rounded-xl border border-gray-800 self-start">
                <button id="btn-tab-3d" onclick="switchTab('3d')" class="px-5 py-2 rounded-lg font-semibold text-sm transition-all bg-teal-500 text-gray-950 shadow-md">3D Preview</button>
                <button id="btn-tab-2d" onclick="switchTab('2d')" class="px-5 py-2 rounded-lg font-semibold text-sm transition-all text-gray-400 hover:text-white">2D Laser Nesting Layout</button>
            </div>

            <!-- Tab: 3D Preview -->
            <div id="tab-3d-content" class="flex-1 min-h-[450px] bg-[#111827] rounded-2xl border border-gray-800 relative overflow-hidden flex flex-col">
                <div id="three-container" class="w-full flex-1 cursor-grab active:cursor-grabbing"></div>
                <div class="absolute bottom-4 left-4 right-4 bg-[#1f2937]/80 backdrop-blur-md px-4 py-2 rounded-lg text-xs text-gray-400 border border-gray-700 flex justify-between items-center">
                    <span>Drag untuk memutar • Scroll untuk zoom</span>
                    <button onclick="resetCamera()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-teal-400 font-medium transition-all">Reset View</button>
                </div>
            </div>

            <!-- Tab: 2D Layout -->
            <div id="tab-2d-content" class="hidden flex-1 min-h-[450px] bg-[#111827] rounded-2xl border border-gray-800 relative p-4 flex flex-col">
                <div class="flex-1 overflow-auto flex items-center justify-center">
                    <canvas id="layout-canvas" class="max-w-full max-h-full border border-gray-800 bg-[#0b0f19] rounded-lg"></canvas>
                </div>
            </div>
        </div>

        <!-- Right Side: Settings Panel -->
        <div class="lg:col-span-4 flex flex-col gap-6 overflow-y-auto max-h-[calc(100vh-130px)]">
            <!-- Source Image Preview -->
            <div class="bg-[#111827] border border-gray-800 rounded-2xl p-5">
                <h2 class="text-sm font-semibold text-teal-400 uppercase tracking-wider mb-4">Source Silhouette</h2>
                <div class="flex items-center gap-4">
                    <div class="w-24 h-24 bg-[#0b0f19] rounded-xl border border-gray-800 flex items-center justify-center overflow-hidden">
                        <canvas id="source-canvas" class="w-full h-full object-contain"></canvas>
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        <label class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-xs font-semibold text-center cursor-pointer transition-all">
                            Upload Silhouette
                            <input type="file" id="image-loader" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                        </label>
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="flex flex-col gap-4">
                <div class="bg-[#111827] border border-gray-800 rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-white border-b border-gray-800 pb-3 mb-4">Dimensi Kotak (mm)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Lebar (W)</label>
                            <input type="number" id="param-box-w" value="120" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Tinggi (H)</label>
                            <input type="number" id="param-box-h" value="90" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Kedalaman (D)</label>
                            <input type="number" id="param-box-d" value="80" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Tebal Akrilik (T)</label>
                            <input type="number" id="param-thickness" value="3" step="0.5" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                    </div>
                </div>

                <div class="bg-[#111827] border border-gray-800 rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-white border-b border-gray-800 pb-3 mb-4">Proyeksi & Proteksi Distorsi</h3>
                    <div class="flex flex-col gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Lebar Gambar Dinding (mm)</label>
                            <input type="number" id="param-wall-w" value="500" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Jarak Lampu (Z-mm)</label>
                            <input type="number" id="param-light-z" value="65" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs text-gray-400">Margin Aman / Safety Buffer</label>
                                <span id="val-safety-margin" class="text-xs text-teal-400 font-mono">2.0 mm</span>
                            </div>
                            <input type="range" id="param-safety-margin" min="1.0" max="5.0" step="0.5" value="2.0" class="w-full accent-teal-500" oninput="updateLabel('safety-margin', this.value + ' mm'); triggerUpdate();">
                        </div>
                    </div>
                </div>

                <div class="bg-[#111827] border border-gray-800 rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-white border-b border-gray-800 pb-3 mb-4">Pemrosesan Vektor & Gigi</h3>
                    <div class="flex flex-col gap-4">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs text-gray-400">Sensitivitas Gambar (Threshold)</label>
                                <span id="val-threshold" class="text-xs text-teal-400">128</span>
                            </div>
                            <input type="range" id="param-threshold" min="30" max="220" value="128" class="w-full accent-teal-500" oninput="updateLabel('threshold', this.value); triggerUpdate();">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Lebar Gigi Sambungan / Tab Width (mm)</label>
                            <input type="number" id="param-tab-w" value="15" class="w-full bg-[#0b0f19] border border-gray-800 rounded-lg px-3 py-2 text-sm text-white" onchange="triggerUpdate()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JS Logic Core -->
    <script>
        let scene, camera, renderer, controls, boxGroup;
        let contours = [];
        let panelsData = {};
        let offscreenCanvas, offscreenCtx;

        window.onload = function() {
            initThree();
            setupOffscreenCanvas();
            drawDefaultSilhouette();
            processImageAndProject();
            animate();
            window.addEventListener('resize', onWindowResize);
        }

        function initThree() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0f19);
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 2000);
            camera.position.set(0, 150, 350);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            scene.add(new THREE.AmbientLight(0x333333));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(100, 300, 100);
            scene.add(dirLight);
            boxGroup = new THREE.Group();
            scene.add(boxGroup);
        }

        function setupOffscreenCanvas() {
            offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = 400;
            offscreenCanvas.height = 400;
            offscreenCtx = offscreenCanvas.getContext('2d');
        }

        function drawDefaultSilhouette() {
            const w = offscreenCanvas.width, h = offscreenCanvas.height, ctx = offscreenCtx;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = "white"; ctx.translate(w/2, h/2);
            ctx.beginPath();
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                const r1 = 110 + Math.sin(i * 3) * 35;
                ctx.lineTo(Math.cos(angle) * r1, Math.sin(angle) * r1);
            }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI * 2); ctx.fill();
            ctx.translate(-w/2, -h/2);
            updateSourcePreviewCanvas();
        }

        function updateSourcePreviewCanvas() {
            const dest = document.getElementById('source-canvas');
            dest.width = 120; dest.height = 120;
            dest.getContext('2d').drawImage(offscreenCanvas, 0, 0, 120, 120);
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    offscreenCtx.fillStyle = "black"; offscreenCtx.fillRect(0, 0, 400, 400);
                    const scale = Math.min(360 / img.width, 360 / img.height);
                    offscreenCtx.drawImage(img, (400 - img.width * scale)/2, (400 - img.height * scale)/2, img.width*scale, img.height*scale);
                    updateSourcePreviewCanvas();
                    processImageAndProject();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function updateLabel(id, val) { document.getElementById('val-' + id).innerText = val; }
        function triggerUpdate() { processImageAndProject(); }

        function processImageAndProject() {
            const threshold = parseInt(document.getElementById('param-threshold').value);
            const imgData = offscreenCtx.getImageData(0, 0, 400, 400);
            const grid = new Uint8Array(400 * 400);
            for (let i = 0; i < imgData.data.length; i += 4) {
                grid[i/4] = (0.299*imgData.data[i] + 0.587*imgData.data[i+1] + 0.114*imgData.data[i+2]) > threshold ? 1 : 0;
            }
            contours = traceContours(grid, 400, 400);
            calculateAnamorphicProjections();
            rebuild3DScene();
            draw2DLayout();
        }

        function traceContours(grid, w, h) {
            const visited = new Uint8Array(w * h), list = [];
            const dx = [1, 1, 0, -1, -1, -1, 0, 1], dy = [0, 1, 1, 1, 0, -1, -1, -1];
            for (let y = 3; y < h - 3; y++) {
                for (let x = 3; x < w - 3; x++) {
                    const idx = y * w + x;
                    if (grid[idx] === 1 && !visited[idx]) {
                        if (grid[idx - 1] === 0 || grid[idx + 1] === 0 || grid[idx - w] === 0 || grid[idx + w] === 0) {
                            const path = []; let cx = x, cy = y, dir = 0, iter = 0;
                            do {
                                visited[cy * w + cx] = 1; path.push({ x: cx, y: cy });
                                let found = false;
                                for (let i = 0; i < 8; i++) {
                                    const checkDir = (dir + i + 5) % 8;
                                    const nx = cx + dx[checkDir], ny = cy + dy[checkDir];
                                    if (nx >= 2 && nx < w - 2 && ny >= 2 && ny < h - 2 && grid[ny * w + nx] === 1) {
                                        cx = nx; cy = ny; dir = checkDir; found = true; break;
                                    }
                                }
                                if (!found) break;
                            } while ((cx !== x || cy !== y) && ++iter < 5000);
                            if (path.length > 8) list.push(path);
                        }
                    }
                }
            }
            return list;
        }

        function calculateAnamorphicProjections() {
            const boxW = parseFloat(document.getElementById('param-box-w').value);
            const boxH = parseFloat(document.getElementById('param-box-h').value);
            const boxD = parseFloat(document.getElementById('param-box-d').value);
            const wallW = parseFloat(document.getElementById('param-wall-w').value);
            const lightZ = parseFloat(document.getElementById('param-light-z').value);
            const safetyMargin = parseFloat(document.getElementById('param-safety-margin').value);

            panelsData = {
                left: { w: boxD, h: boxH, subPaths: [] }, right: { w: boxD, h: boxH, subPaths: [] },
                top: { w: boxD, h: boxW, subPaths: [] }, bottom: { w: boxD, h: boxW, subPaths: [] }
            };

            const pixelToMM = wallW / 400;

            contours.forEach(contour => {
                let currentPanel = null, currentSubPath = [];
                contour.forEach(pt => {
                    const xW = (pt.x - 200) * pixelToMM;
                    const yW = (200 - pt.y) * pixelToMM;
                    if (Math.abs(xW) <= boxW / 2 && Math.abs(yW) <= boxH / 2) { closeSubPath(); return; }

                    let targetPanel = "", t = 0, u = 0;
                    const absX = Math.abs(xW), absY = Math.abs(yW);

                    if (absX * boxH > absY * boxW) {
                        if (xW > 0) { targetPanel = "right"; t = (boxW / 2) / xW; u = t * yW; }
                        else { targetPanel = "left"; t = (-boxW / 2) / xW; u = -t * yW; }
                    } else {
                        if (yW > 0) { targetPanel = "top"; t = (boxH / 2) / yW; u = t * xW; }
                        else { targetPanel = "bottom"; t = (-boxH / 2) / yW; u = -t * xW; }
                    }

                    const v = lightZ * (1 - t);
                    if (v < safetyMargin || v > (boxD - safetyMargin)) { closeSubPath(); return; }

                    let normalX = 0, normalY = 0;
                    if (targetPanel === "right") normalX = -1;
                    else if (targetPanel === "left") normalX = 1;
                    else if (targetPanel === "top") normalY = -1;
                    else if (targetPanel === "bottom") normalY = 1;

                    const rayLength = Math.sqrt(xW * xW + yW * yW + lightZ * lightZ);
                    if (Math.abs((xW * normalX) + (yW * normalY)) / rayLength < 0.087) { closeSubPath(); return; }

                    if (targetPanel !== currentPanel) { closeSubPath(); currentPanel = targetPanel; }

                    let x3d = 0, y3d = 0, z3d = v - boxD/2;
                    if (targetPanel === "right") { x3d = boxW/2; y3d = u; }
                    else if (targetPanel === "left") { x3d = -boxW/2; y3d = -u; }
                    else if (targetPanel === "top") { x3d = u; y3d = boxH/2; }
                    else if (targetPanel === "bottom") { x3d = -u; y3d = -boxH/2; }

                    currentSubPath.push({ u, v, x3d, y3d, z3d });
                });

                function closeSubPath() {
                    if (currentSubPath.length > 1 && currentPanel) {
                        panelsData[currentPanel].subPaths.push(currentSubPath);
                    }
                    currentSubPath = []; currentPanel = null;
                }
                closeSubPath();
            });
        }

        function generateEdgeJoint(p1, p2, jointType, tabWidth, thickness) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.sqrt(dx*dx + dy*dy);
            if (jointType === 'none' || len < tabWidth) return [p1, p2];
            let n = Math.floor(len / tabWidth); if (n % 2 === 0) n = Math.max(1, n - 1);
            const step = len / n, points = [{ x: p1.x, y: p1.y }], ux = dx/len, uy = dy/len, nx = uy, ny = -ux;

            for (let i = 0; i < n; i++) {
                const ptStart = { x: p1.x + (i * step) * ux, y: p1.y + (i * step) * uy };
                const ptEnd = { x: p1.x + ((i + 1) * step) * ux, y: p1.y + ((i + 1) * step) * uy };
                if (jointType === 'male' && i % 2 === 0) {
                    points.push({ x: ptStart.x + thickness * nx, y: ptStart.y + thickness * ny });
                    points.push({ x: ptEnd.x + thickness * nx, y: ptEnd.y + thickness * ny });
                } else if (jointType === 'female' && i % 2 !== 0) {
                    points.push({ x: ptStart.x - thickness * nx, y: ptStart.y - thickness * ny });
                    points.push({ x: ptEnd.x - thickness * nx, y: ptEnd.y - thickness * ny });
                } else {
                    points.push(ptStart, ptEnd);
                }
            }
            points.push({ x: p2.x, y: p2.y });
            return points;
        }

        function getPanelOutline(w, h, joints, tabWidth, thickness) {
            const edges = [
                generateEdgeJoint({x:0, y:0}, {x:w, y:0}, joints.bottom, tabWidth, thickness),
                generateEdgeJoint({x:w, y:0}, {x:w, y:h}, joints.right, tabWidth, thickness),
                generateEdgeJoint({x:w, y:h}, {x:0, y:h}, joints.top, tabWidth, thickness),
                generateEdgeJoint({x:0, y:h}, {x:0, y:0}, joints.left, tabWidth, thickness)
            ];
            const combined = [];
            edges.forEach(edge => {
                edge.forEach(p => {
                    if (combined.length === 0 || Math.hypot(p.x - combined[combined.length-1].x, p.y - combined[combined.length-1].y) > 0.01) {
                        combined.push(p);
                    }
                });
            });
            return combined;
        }

        function rebuild3DScene() {
            while(boxGroup.children.length > 0) boxGroup.remove(boxGroup.children[0]);
            const boxW = parseFloat(document.getElementById('param-box-w').value);
            const boxH = parseFloat(document.getElementById('param-box-h').value);
            const boxD = parseFloat(document.getElementById('param-box-d').value);
            const thickness = parseFloat(document.getElementById('param-thickness').value);
            const tabWidth = parseFloat(document.getElementById('param-tab-w').value);

            const material = new THREE.MeshStandardMaterial({ color: 0x0f766e, roughness: 0.1, transparent: true, opacity: 0.8, side: THREE.DoubleSide });

            const renderMesh = (w, h, joints, name, pos, rot) => {
                const shape = new THREE.Shape(), outline = getPanelOutline(w, h, joints, tabWidth, thickness);
                shape.moveTo(outline[0].x, outline[0].y);
                for (let i = 1; i < outline.length; i++) shape.lineTo(outline[i].x, outline[i].y);
                if (name !== 'back' && panelsData[name]) {
                    panelsData[name].subPaths.forEach(subPath => {
                        const hole = new THREE.Path(); hole.moveTo(subPath[0].v, subPath[0].u + h/2);
                        for (let i = 1; i < subPath.length; i++) hole.lineTo(subPath[i].v, subPath[i].u + h/2);
                        shape.holes.push(hole);
                    });
                }
                const mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false }), material);
                mesh.position.copy(pos); mesh.rotation.copy(rot); boxGroup.add(mesh);
            };

            renderMesh(boxW, boxH, { left: 'female', right: 'female', bottom: 'female', top: 'female' }, 'back', new THREE.Vector3(-boxW/2, -boxH/2, -boxD/2 - thickness), new THREE.Euler(0, 0, 0));
            renderMesh(boxD, boxH, { left: 'male', right: 'none', bottom: 'male', top: 'male' }, 'left', new THREE.Vector3(-boxW/2, -boxH/2, -boxD/2), new THREE.Euler(0, Math.PI/2, 0));
            renderMesh(boxD, boxH, { left: 'male', right: 'none', bottom: 'male', top: 'male' }, 'right', new THREE.Vector3(boxW/2 + thickness, -boxH/2, -boxD/2), new THREE.Euler(0, Math.PI/2, 0));
            renderMesh(boxD, boxW, { left: 'male', right: 'none', bottom: 'female', top: 'female' }, 'top', new THREE.Vector3(-boxW/2, boxH/2 + thickness, -boxD/2), new THREE.Euler(-Math.PI/2, 0, -Math.PI/2));
            renderMesh(boxD, boxW, { left: 'male', right: 'none', bottom: 'female', top: 'female' }, 'bottom', new THREE.Vector3(-boxW/2, -boxH/2, -boxD/2), new THREE.Euler(-Math.PI/2, 0, -Math.PI/2));
        }

        function draw2DLayout() {
            const canvas = document.getElementById('layout-canvas'), ctx = canvas.getContext('2d');
            const boxW = parseFloat(document.getElementById('param-box-w').value);
            const boxH = parseFloat(document.getElementById('param-box-h').value);
            const boxD = parseFloat(document.getElementById('param-box-d').value);
            const thickness = parseFloat(document.getElementById('param-thickness').value);
            const tabWidth = parseFloat(document.getElementById('param-tab-w').value);

            const gap = 15, totalW = boxD * 2 + boxW + gap * 2 + 40, totalH = Math.max(boxH, boxW) * 2 + gap + 40;
            canvas.width = totalW * 2; canvas.height = totalH * 2; ctx.scale(2, 2);
            ctx.fillStyle = "#0b0f19"; ctx.fillRect(0, 0, totalW, totalH);

            const layout = {
                left:   { x: 20, y: 20, w: boxD, h: boxH, title: "LEFT PANEL" },
                back:   { x: 20 + boxD + gap, y: 20, w: boxW, h: boxH, title: "BACK PANEL" },
                right:  { x: 20 + boxD + boxW + gap * 2, y: 20, w: boxD, h: boxH, title: "RIGHT PANEL" },
                top:    { x: 20, y: 20 + Math.max(boxH, boxW) + gap, w: boxD, h: boxW, title: "TOP PANEL" },
                bottom: { x: 20 + boxD + gap, y: 20 + Math.max(boxH, boxW) + gap, w: boxD, h: boxW, title: "BOTTOM PANEL" }
            };

            const jointsConfig = {
                left: { left: 'male', right: 'none', bottom: 'male', top: 'male' }, right: { left: 'male', right: 'none', bottom: 'male', top: 'male' },
                top: { left: 'male', right: 'none', bottom: 'female', top: 'female' }, bottom: { left: 'male', right: 'none', bottom: 'female', top: 'female' },
                back: { left: 'female', right: 'female', bottom: 'female', top: 'female' }
            };

            Object.keys(layout).forEach(key => {
                const p = layout[key]; ctx.save(); ctx.translate(p.x, p.y);
                const outline = getPanelOutline(p.w, p.h, jointsConfig[key], tabWidth, thickness);
                ctx.strokeStyle = "#14b8a6"; ctx.beginPath(); ctx.moveTo(outline[0].x, outline[0].y);
                for(let i=1; i<outline.length; i++) ctx.lineTo(outline[i].x, outline[i].y);
                ctx.closePath(); ctx.stroke();

                if (key !== 'back' && panelsData[key]) {
                    ctx.strokeStyle = "#ef4444";
                    panelsData[key].subPaths.forEach(path => {
                        ctx.beginPath(); ctx.moveTo(path[0].v, path[0].u + p.h/2);
                        for(let i=1; i<path.length; i++) ctx.lineTo(path[i].v, path[i].u + p.h/2);
                        ctx.stroke();
                    });
                }
                ctx.fillStyle = "#6b7280"; ctx.font = "8px sans-serif"; ctx.fillText(p.title, 5, -5); ctx.restore();
            });
        }

        function exportDXF() {
            const boxW = parseFloat(document.getElementById('param-box-w').value), boxH = parseFloat(document.getElementById('param-box-h').value);
            const boxD = parseFloat(document.getElementById('param-box-d').value), thickness = parseFloat(document.getElementById('param-thickness').value);
            const tabWidth = parseFloat(document.getElementById('param-tab-w').value);

            let dxf = "0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";
            const gap = 15, layout = {
                left: { x: 0, y: 0, w: boxD, h: boxH }, back: { x: boxD + gap, y: 0, w: boxW, h: boxH }, right: { x: boxD + boxW + gap * 2, y: 0, w: boxD, h: boxH },
                top: { x: 0, y: Math.max(boxH, boxW) + gap, w: boxD, h: boxW }, bottom: { x: boxD + gap, y: Math.max(boxH, boxW) + gap, w: boxD, h: boxW }
            };

            const jointsConfig = {
                left: { left: 'male', right: 'none', bottom: 'male', top: 'male' }, right: { left: 'male', right: 'none', bottom: 'male', top: 'male' },
                top: { left: 'male', right: 'none', bottom: 'female', top: 'female' }, bottom: { left: 'male', right: 'none', bottom: 'female', top: 'female' },
                back: { left: 'female', right: 'female', bottom: 'female', top: 'female' }
            };

            const addDxfPoly = (points, offset, color) => {
                dxf += "0\nPOLYLINE\n8\nCUT\n62\n" + color + "\n66\n1\n70\n1\n";
                points.forEach(p => { dxf += "0\nVERTEX\n8\nCUT\n10\n" + (p.x + offset.x).toFixed(4) + "\n20\n" + (p.y + offset.y).toFixed(4) + "\n30\n0.0\n"; });
                dxf += "0\nSEQEND\n";
            };

            Object.keys(layout).forEach(key => {
                const p = layout[key], outline = getPanelOutline(p.w, p.h, jointsConfig[key], tabWidth, thickness);
                addDxfPoly(outline, p, 1);
                if (key !== 'back' && panelsData[key]) {
                    panelsData[key].subPaths.forEach(path => {
                        addDxfPoly(path.map(pt => ({ x: pt.v, y: pt.u + p.h/2 })), p, 2);
                    });
                }
            });
            dxf += "0\nENDSEC\n0\nEOF\n";
            downloadFile(dxf, "application/dxf", "Shadow_Box.dxf");
        }

        function exportSVG() {
            const boxW = parseFloat(document.getElementById('param-box-w').value), boxH = parseFloat(document.getElementById('param-box-h').value);
            const boxD = parseFloat(document.getElementById('param-box-d').value), thickness = parseFloat(document.getElementById('param-thickness').value);
            const tabWidth = parseFloat(document.getElementById('param-tab-w').value);

            const gap = 15, totalW = boxD * 2 + boxW + gap * 2 + 40, totalH = Math.max(boxH, boxW) * 2 + gap + 40;
            let svg = `<?xml version="1.0" encoding="utf-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}mm" height="${totalH}mm" viewBox="0 0 ${totalW} ${totalH}">\n`;

            const layout = {
                left: { x: 20, y: 20, w: boxD, h: boxH }, back: { x: 20 + boxD + gap, y: 20, w: boxW, h: boxH }, right: { x: 20 + boxD + boxW + gap * 2, y: 20, w: boxD, h: boxH },
                top: { x: 20, y: 20 + Math.max(boxH, boxW) + gap, w: boxD, h: boxW }, bottom: { x: 20 + boxD + gap, y: 20 + Math.max(boxH, boxW) + gap, w: boxD, h: boxW }
            };

            const jointsConfig = {
                left: { left: 'male', right: 'none', bottom: 'male', top: 'male' }, right: { left: 'male', right: 'none', bottom: 'male', top: 'male' },
                top: { left: 'male', right: 'none', bottom: 'female', top: 'female' }, bottom: { left: 'male', right: 'none', bottom: 'female', top: 'female' },
                back: { left: 'female', right: 'female', bottom: 'female', top: 'female' }
            };

            Object.keys(layout).forEach(key => {
                const p = layout[key], outline = getPanelOutline(p.w, p.h, jointsConfig[key], tabWidth, thickness);
                let d = `M ${(outline[0].x + p.x).toFixed(2)} ${(outline[0].y + p.y).toFixed(2)} ` + outline.slice(1).map(pt => `L ${(pt.x + p.x).toFixed(2)} ${(pt.y + p.y).toFixed(2)}`).join(" ") + " Z";
                svg += `  <path d="${d}" fill="none" stroke="black" stroke-width="0.1" />\n`;

                if (key !== 'back' && panelsData[key]) {
                    panelsData[key].subPaths.forEach(path => {
                        let hd = `M ${(path[0].v + p.x).toFixed(2)} ${(path[0].u + p.h/2 + p.y).toFixed(2)} ` + path.slice(1).map(pt => `L ${(pt.v + p.x).toFixed(2)} ${(pt.u + p.h/2 + p.y).toFixed(2)}`).join(" ");
                        svg += `  <path d="${hd}" fill="none" stroke="red" stroke-width="0.1" />\n`;
                    });
                }
            });
            svg += "</svg>";
            downloadFile(svg, "image/svg+xml", "Shadow_Box.svg");
        }

        function downloadFile(content, mimeType, filename) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function switchTab(tab) {
            const btn3d = document.getElementById('btn-tab-3d'), btn2d = document.getElementById('btn-tab-2d');
            const c3d = document.getElementById('tab-3d-content'), c2d = document.getElementById('tab-2d-content');
            if (tab === '3d') {
                btn3d.className = "px-5 py-2 rounded-lg font-semibold text-sm transition-all bg-teal-500 text-gray-950 shadow-md";
                btn2d.className = "px-5 py-2 rounded-lg font-semibold text-sm transition-all text-gray-400 hover:text-white";
                c3d.classList.remove('hidden'); c2d.classList.add('hidden');
            } else {
                btn2d.className = "px-5 py-2 rounded-lg font-semibold text-sm transition-all bg-teal-500 text-gray-950 shadow-md";
                btn3d.className = "px-5 py-2 rounded-lg font-semibold text-sm transition-all text-gray-400 hover:text-white";
                c2d.classList.remove('hidden'); c3d.classList.add('hidden'); draw2DLayout();
            }
        }

        function resetCamera() { controls.reset(); camera.position.set(0, 150, 350); }
        function onWindowResize() {
            const container = document.getElementById('three-container');
            camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    </script>
</body>
